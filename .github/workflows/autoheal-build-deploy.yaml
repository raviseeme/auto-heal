name: autoheal-build-deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  ARTIFACT_CONTAINER: autoheal-artifacts
  NORMALIZER_APP_NAME: autoheal-dev-func-normalizer
  ORCHESTRATOR_APP_NAME: autoheal-dev-func-orchestrator

jobs:
  build-and-deploy-normalizer:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: services/event-normalizer
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -t .python_packages/lib/site-packages

      - name: Zip package
        working-directory: services/event-normalizer
        run: |
          zip -r ../../event-normalizer.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: >-
            {"clientId":"${{ secrets.AZURE_CLIENT_ID }}",
             "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
             "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
             "tenantId":"${{ secrets.AZURE_TENANT_ID }}"}

      - name: Upload artifact to Blob
        run: |
          az storage blob upload \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            --container-name "${{ env.ARTIFACT_CONTAINER }}" \
            --name "event-normalizer-${{ github.sha }}.zip" \
            --file "event-normalizer.zip" \
            --auth-mode login \
            --overwrite true

      - name: Deploy event-normalizer
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.NORMALIZER_APP_NAME }}
          package: event-normalizer.zip

  build-and-deploy-orchestrator:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: services/orchestrator-core
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -t .python_packages/lib/site-packages

      - name: Zip package
        working-directory: services/orchestrator-core
        run: |
          zip -r ../../orchestrator-core.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: >-
            {"clientId":"${{ secrets.AZURE_CLIENT_ID }}",
             "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
             "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
             "tenantId":"${{ secrets.AZURE_TENANT_ID }}"}

      - name: Upload artifact to Blob
        run: |
          az storage blob upload \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            --container-name "${{ env.ARTIFACT_CONTAINER }}" \
            --name "orchestrator-core-${{ github.sha }}.zip" \
            --file "orchestrator-core.zip" \
            --auth-mode login \
            --overwrite true

      - name: Deploy orchestrator-core
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.ORCHESTRATOR_APP_NAME }}
          package: orchestrator-core.zip