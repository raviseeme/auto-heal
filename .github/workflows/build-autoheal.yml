name: autoheal-build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  ARTIFACT_CONTAINER: autoheal-artifacts

jobs:
  build-normalizer:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repo structure
        run: |
          pwd
          ls -R

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: services/event-normalizer
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -t .python_packages/lib/site-packages

      - name: Zip package
        working-directory: services/event-normalizer
        run: |
          zip -r ../../event-normalizer.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: >-
            {"clientId":"${{ secrets.AZURE_CLIENT_ID }}",
             "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
             "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
             "tenantId":"${{ secrets.AZURE_TENANT_ID }}"}

      - name: Upload artifact
        run: |
          az storage blob upload \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            --container-name "${{ env.ARTIFACT_CONTAINER }}" \
            --name "event-normalizer-${{ github.sha }}.zip" \
            --file "event-normalizer.zip" \
            --auth-mode login \
            --overwrite true

  build-orchestrator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repo structure
        run: |
          pwd
          ls -R

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: services/orchestrator-core
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -t .python_packages/lib/site-packages

      - name: Zip package
        working-directory: services/orchestrator-core
        run: |
          zip -r ../../orchestrator-core.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: >-
            {"clientId":"${{ secrets.AZURE_CLIENT_ID }}",
             "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
             "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
             "tenantId":"${{ secrets.AZURE_TENANT_ID }}"}

      - name: Upload artifact
        run: |
          az storage blob upload \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            --container-name "${{ env.ARTIFACT_CONTAINER }}" \
            --name "orchestrator-core-${{ github.sha }}.zip" \
            --file "orchestrator-core.zip" \
            --auth-mode login \
            --overwrite true

  trigger-ado:
    needs: [build-normalizer, build-orchestrator]
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Azure DevOps pipeline
        run: |
          curl -u :${{ secrets.ADO_PAT }} \
            -H "Content-Type: application/json" \
            -X POST \
            "https://dev.azure.com/${{ secrets.ADO_ORG }}/${{ secrets.ADO_PROJECT }}/_apis/pipelines/${{ secrets.ADO_PIPELINE_ID }}/runs?api-version=7.1-preview.1" \
            -d "{\"templateParameters\": {\"gitSha\": \"${{ github.sha }}\"}}"