name: autoheal-build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  ARTIFACT_CONTAINER: autoheal-artifacts

jobs:

  build-normalizer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd services/event-normalizer
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -t .python_packages/lib/site-packages

      - name: Zip package
        run: |
          cd services/event-normalizer
          zip -r ../../event-normalizer.zip .

      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Upload artifact
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name $ARTIFACT_CONTAINER \
            --name event-normalizer-${{ github.sha }}.zip \
            --file event-normalizer.zip \
            --overwrite true

  build-orchestrator:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd services/orchestrator-core
          python -m pip install -r requirements.txt -t .python_packages/lib/site-packages

      - name: Zip package
        run: |
          cd services/orchestrator-core
          zip -r ../../orchestrator-core.zip .

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload artifact
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --container-name $ARTIFACT_CONTAINER \
            --name orchestrator-core-${{ github.sha }}.zip \
            --file orchestrator-core.zip \
            --overwrite true

  trigger-ado:
    needs: [build-normalizer, build-orchestrator]
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Azure DevOps pipeline
        run: |
          curl -u :${{ secrets.ADO_PAT }} \
          -H "Content-Type: application/json" \
          -X POST \
          "https://dev.azure.com/${{ secrets.ADO_ORG }}/${{ secrets.ADO_PROJECT }}/_apis/pipelines/${{ secrets.ADO_PIPELINE_ID }}/runs?api-version=7.1-preview.1" \
          -d "{\"templateParameters\": {\"gitSha\": \"${{ github.sha }}\"}}"
